name: Python

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'
      - 'py_v*'

jobs:
  build-wheels:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            gcc_version: latest
          - os: macos-15
            arch: arm64
            macos_deployment_target: '15.0'
          - os: macos-15-intel
            arch: x86_64
            macos_deployment_target: '15.0'
          - os: windows-2022

    steps:
      - uses: actions/checkout@v6

      - uses: fortran-lang/setup-fortran@v1
        if: runner.os == 'Linux' || runner.os == 'Windows'
        with:
          compiler: gcc
      - name: Setup Fortran toolchain (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install gcc
          GCC_PREFIX="$(brew --prefix gcc)"
          echo "FC=$GCC_PREFIX/bin/gfortran-14" >> $GITHUB_ENV
          echo "CC=clang" >> $GITHUB_ENV
          echo "CXX=clang++" >> $GITHUB_ENV
          echo "LDFLAGS=-L$GCC_PREFIX/lib/gcc/14" >> $GITHUB_ENV
          echo "DYLD_LIBRARY_PATH=$GCC_PREFIX/lib/gcc/14" >> $GITHUB_ENV

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.4.0
        env:
          CIBW_BUILD: 'cp310-* cp311-* cp312-* cp313-* cp314-*'
          CIBW_BUILD_VERBOSITY: 1
          CIBW_CONFIG_SETTINGS: compile-args=-v
          CIBW_SKIP: '*-musllinux* *i686 *-win32'
          CIBW_MANYLINUX_X86_64_IMAGE: manylinux_2_28
          CIBW_BEFORE_ALL_LINUX: dnf install -y gcc-gfortran libgomp
          CIBW_BEFORE_ALL_MACOS: >
            ARCH=$(uname -m) &&
            curl -L https://github.com/isuruf/gcc/releases/download/gcc-11.3.0-2/gfortran-darwin-${ARCH}-native.tar.gz -o /tmp/gfortran.tar.gz &&
            sudo tar -xzf /tmp/gfortran.tar.gz -C /opt &&
            sudo mkdir -p /usr/local/bin /usr/local/lib &&
            sudo ln -sf /opt/gfortran-darwin-${ARCH}-native/bin/gfortran /usr/local/bin/gfortran &&
            sudo ln -sf /opt/gfortran-darwin-${ARCH}-native/lib/libgfortran.5.dylib /usr/local/lib/ &&
            sudo ln -sf /opt/gfortran-darwin-${ARCH}-native/lib/libgfortran.dylib /usr/local/lib/ &&
            sudo ln -sf /opt/gfortran-darwin-${ARCH}-native/lib/libquadmath.0.dylib /usr/local/lib/ &&
            sudo ln -sf /opt/gfortran-darwin-${ARCH}-native/lib/libquadmath.dylib /usr/local/lib/ &&
            sudo ln -sf /opt/gfortran-darwin-${ARCH}-native/lib/libgcc_s.1.dylib /usr/local/lib/ &&
            sudo ln -sf /opt/gfortran-darwin-${ARCH}-native/lib/libgcc_s.1.1.dylib /usr/local/lib/ &&
            sudo ln -sf /opt/gfortran-darwin-${ARCH}-native/lib/libobjc.A.dylib /usr/local/lib/ &&
            sudo ln -sf /opt/gfortran-darwin-${ARCH}-native/lib/libatomic.dylib /usr/local/lib/ &&
            sudo ln -sf /opt/gfortran-darwin-${ARCH}-native/lib/libatomic.a /usr/local/lib/ &&
            brew install libomp &&
            sudo ln -sf $(brew --prefix libomp)/lib/libomp.dylib /usr/local/lib/libomp.dylib

          CIBW_ENVIRONMENT_MACOS: >
            FC="$FC"
            CC="$CC"
            CXX="$CXX"
            LDFLAGS="$LDFLAGS"
            DYLD_LIBRARY_PATH="$DYLD_LIBRARY_PATH"
            MACOSX_DEPLOYMENT_TARGET=${{ matrix.macos_deployment_target }}
            SDKROOT=$(xcrun --show-sdk-path)
            LIBRARY_PATH=$(xcrun --show-sdk-path)/usr/lib:/usr/local/lib:/opt/gfortran-darwin-${ARCH}-native/lib
            DYLD_LIBRARY_PATH=/usr/local/lib:/opt/gfortran-darwin-${ARCH}-native/lib
            LDFLAGS=-latomic
          CIBW_ARCHS_MACOS: ${{ matrix.arch }}
          CIBW_BEFORE_BUILD_WINDOWS: pip install delvewheel
          CIBW_REPAIR_WHEEL_COMMAND_WINDOWS: >
            delvewheel repair --add-path C:\msys64\mingw64\bin -w {dest_dir} {wheel}
          CIBW_TEST_REQUIRES: pytest
          CIBW_TEST_COMMAND: python -m pytest -s {project}/python/test

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl

      - run: echo "TAG_NAME=$(date +"linux-build-%Y%m%d-%H%M%S")" >> $GITHUB_ENV
        if: runner.os != 'Windows'

      - run: |
          "TAG_NAME=$(Get-Date -Format 'windows-build-yyyyMMdd-HHmmss')" >> $env:GITHUB_ENV
        shell: pwsh
        if: runner.os == 'Windows'

      - uses: softprops/action-gh-release@v2
        with:
          prerelease: true
          name: ${{ env.TAG_NAME }}
          tag_name: ${{ env.TAG_NAME }}
          files: wheelhouse/*.whl
          generate_release_notes: true

  build-sdist:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install build
        run: pip install build

      - name: Build sdist
        run: python -m build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz
